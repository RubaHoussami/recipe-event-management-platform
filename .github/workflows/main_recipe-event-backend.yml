# Docs: https://github.com/Azure/webapps-deploy
name: Build and deploy Python app to Azure Web App - recipe-event-backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/main_recipe-event-backend.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (backend)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment package (zip backend)
        run: |
          cd backend
          zip -r ../backend.zip .

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F4ADF876C9E94AB3937BB9269BD93631 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_26475EA5D67E434A8051275597B4C692 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_068E1811C0734C96A4336EE6D2617BC2 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "recipe-event-backend"
          slot-name: "Production"
          package: backend.zip
